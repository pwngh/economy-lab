services:
  # Postgres for the Postgres engine (src/engines/postgres.ts).
  postgres:
    # Pinned by multi-arch index digest; refresh with
    # `docker manifest inspect postgres:16-alpine`.
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: economy
      POSTGRES_PASSWORD: economy
      POSTGRES_DB: economy_lab
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U economy -d economy_lab']
      interval: 5s
      timeout: 5s
      retries: 5

  # SQS for the outbox worker's dispatcher (see src/adapters/sqs.ts).
  localstack:
    # Pinned by multi-arch index digest; refresh with
    # `docker manifest inspect localstack/localstack:3`.
    image: localstack/localstack:3@sha256:b279c01f4cfb8f985a482e4014cabc1e2697b9d7a6c8c8db2e40f4d9f93687c7
    environment:
      SERVICES: sqs
    ports:
      - '4566:4566'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 5s
      retries: 5

  # MySQL for the MySQL engine (src/engines/mysql.ts). The fixtures and tests
  # connect via MYSQL_TEST_URL and create a throwaway database per run, so they use root.
  mysql:
    image: mysql:8.4
    # Drop the binary log: on a single node it is a redundant second fsync per commit, where
    # Postgres pays one. `--skip-log-bin` keeps full redo-log durability
    # (innodb_flush_log_at_trx_commit stays 1) and just removes the binlog fsync, with no
    # durability traded away (the lossy flush=2 knob is left unset).
    command: ['--skip-log-bin']
    environment:
      MYSQL_ROOT_PASSWORD: economy
      MYSQL_DATABASE: economy_lab
    ports:
      - '3306:3306'
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-peconomy']
      interval: 5s
      timeout: 5s
      retries: 20

  # Redis for the read-through cache adapter (src/adapters/redis.ts).
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Production-parity benchmark runner: runs scripts/bench.ts INSIDE a Linux container against the
  # compose Postgres/MySQL, so the commit pays a real Linux fsync (unlike Homebrew Postgres on macOS,
  # where fsync skips F_FULLFSYNC). Reaches the DBs by service name, so it ignores whatever owns the
  # host's 5432/3306; the repo is mounted in (pg/mysql2 are pure JS). Under the "tools" profile, so a
  # plain `docker compose up` skips it. Run: `make bench-prod`, or `docker compose run --rm bench [...]`.
  bench:
    image: node:22-slim
    profiles: ['tools']
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://economy:economy@postgres:5432/economy_lab
      MYSQL_TEST_URL: mysql://root:economy@mysql:3306/economy_lab
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    entrypoint: ['node']
    command: ['scripts/bench.ts']
