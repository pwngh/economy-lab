# Host ports sit off the well-known defaults (55432/53306/56379/54566) so a native service on
# the developer's machine (a Homebrew postgres on 5432, say) can never shadow these containers.
services:
  postgres:
    # Pinned by multi-arch index digest; refresh with
    # `docker manifest inspect postgres:16-alpine`.
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: economy
      POSTGRES_PASSWORD: economy
      POSTGRES_DB: economy_lab
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U economy -d economy_lab']
      interval: 5s
      timeout: 5s
      retries: 5

  # SQS for the outbox worker's dispatcher (see src/adapters/sqs.ts).
  localstack:
    # Pinned by index digest; refresh: `docker manifest inspect localstack/localstack:3`.
    image: localstack/localstack:3@sha256:b279c01f4cfb8f985a482e4014cabc1e2697b9d7a6c8c8db2e40f4d9f93687c7
    environment:
      SERVICES: sqs
    ports:
      - '54566:4566'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 5s
      retries: 5

  # Tests create a throwaway database per run, so they connect as root.
  mysql:
    image: mysql:8.4
    # Drop the binary log: on a single node it is a redundant second fsync per commit. Full
    # redo-log durability stays (innodb_flush_log_at_trx_commit remains 1); only the binlog
    # fsync goes.
    command: ['--skip-log-bin']
    environment:
      MYSQL_ROOT_PASSWORD: economy
      MYSQL_DATABASE: economy_lab
    ports:
      - '53306:3306'
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-peconomy']
      interval: 5s
      timeout: 5s
      retries: 20

  # Redis for the read-through cache adapter (src/adapters/redis.ts).
  redis:
    image: redis:7-alpine
    ports:
      - '56379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Production-parity bench: runs scripts/bench.ts inside a Linux container so a commit pays a
  # real fsync (macOS fsync skips the full flush). Reaches the DBs by service name, ignoring
  # whatever owns the host's ports. Under the "tools" profile, so a plain `docker compose up`
  # skips it; run with `make bench-prod`.
  bench:
    image: node:22-slim
    profiles: ['tools']
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://economy:economy@postgres:5432/economy_lab
      MYSQL_TEST_URL: mysql://root:economy@mysql:3306/economy_lab
      # Both DBs are compose-guaranteed here, so a skip means a dead container (e.g. OOM-killed
      # mid-run) — fail the run rather than reporting partial coverage as a pass.
      BENCH_REQUIRE: postgres,mysql
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    entrypoint: ['node']
    command: ['scripts/bench.ts']
