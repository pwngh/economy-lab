services:
  postgres:
    # Pinned by multi-arch index digest (Docker Hub registry API lookup; refresh
    # with `docker manifest inspect postgres:16-alpine`).
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: economy
      POSTGRES_PASSWORD: economy
      POSTGRES_DB: economy_lab
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U economy -d economy_lab']
      interval: 5s
      timeout: 5s
      retries: 5

  # SQS for the outbox worker's dispatcher (see src/adapters/sqs.ts).
  localstack:
    # Pinned by digest (Docker Hub registry API lookup). NOTE: the API reported an
    # implausibly old last-updated date for this tag, so re-verify with
    # `docker manifest inspect localstack/localstack:3` before relying on it.
    image: localstack/localstack:3@sha256:b279c01f4cfb8f985a482e4014cabc1e2697b9d7a6c8c8db2e40f4d9f93687c7
    environment:
      SERVICES: sqs
    ports:
      - '4566:4566'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 5s
      retries: 5

  # MySQL for the mysql Store adapter (src/adapters/mysql.ts). The fixture/test connect
  # via MYSQL_TEST_URL and create a throwaway database per run, so root is used.
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: economy
      MYSQL_DATABASE: economy_lab
    ports:
      - '3306:3306'
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-peconomy']
      interval: 5s
      timeout: 5s
      retries: 20

  # Redis for the read-through cache adapter (src/adapters/redis.ts).
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
