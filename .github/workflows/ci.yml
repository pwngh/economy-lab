name: ci

on:
  push:
    branches: [master, main]
  pull_request:

# Least privilege: CI only needs to read the repo. (Default tokens are broader.)
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `npm run check` gates identically to local `make check`. The pg/mysql conformance tests skip
  # themselves when no backend is reachable, so this job stays green without services.
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run check
      # The property suites run inside `npm test` too; alone, a broken ledger law fails with
      # the shrunk counterexample and its seed as the step's whole output.
      - run: npm run prop

  # The two React Router apps live outside the root lint/typecheck gate (their own toolchains).
  # Each runs its full verify suite; the docs add the two source-of-truth gates, so a stale
  # anchor or an undocumented export fails the pull request, not the deploy.
  apps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Full history: check:ref resolves the docs' pinned REPO_REF commit, which a shallow
      # checkout would not have.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm ci --prefix apps/console
      - run: npm run verify --prefix apps/console
      - run: npm run budget --prefix apps/console
      - run: npm ci --prefix apps/docs
      - run: npm run verify --prefix apps/docs
      - run: npm run check:ref --prefix apps/docs
      # The workbench's gates need the built site: the CSP check proves the sandbox's eval grant
      # stays confined to its one path rule, and the static check holds the no-hydration line and
      # the runner's per-tier byte budgets.
      - run: npm run build --prefix apps/docs
      - run: npm run check:csp --prefix apps/docs
      - run: npm run check:static --prefix apps/docs

  # The differential matrix: memory, postgres, mysql, and http proven byte-identical in CI.
  # timeout-minutes bounds a deadlock or stuck connection to a clean failure instead of the
  # default six-hour ceiling.
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: economy
          POSTGRES_PASSWORD: economy
          POSTGRES_DB: economy_lab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U economy -d economy_lab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: economy
          MYSQL_DATABASE: economy_lab
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -peconomy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://economy:economy@localhost:5432/economy_lab
      MYSQL_TEST_URL: mysql://root:economy@localhost:3306/economy_lab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      # Applies the Postgres schema via scripts/migrate.sh (psql is preinstalled on the runner) and
      # so doubles as a smoke test of the migrate tooling; the suites self-apply their own schemas.
      - run: npm run db:migrate
      - run: npm test
      - run: npm run prove
      - run: npm run fuzz
      # Sweeps the throwaway namespaces the runs above created and orphaned (if any), so the
      # sweeper's live-database path is exercised on both engines every CI run.
      - run: npm run db:clean
