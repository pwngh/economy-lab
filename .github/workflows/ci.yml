name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # Fast feedback with no database: type-check, lint, and the suite (the pg/mysql conformance
  # tests skip themselves when no backend is reachable, so this stays green without services).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18'
          cache: npm
      - run: npm ci
      - run: npm run check

  # The full differential matrix: stand up Postgres and MySQL, then run the suite + prove + fuzz
  # so memory, postgres, mysql, and http are all proven byte-identical in CI.
  matrix:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: economy
          POSTGRES_PASSWORD: economy
          POSTGRES_DB: economy_lab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U economy -d economy_lab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: economy
          MYSQL_DATABASE: economy_lab
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -peconomy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://economy:economy@localhost:5432/economy_lab
      MYSQL_TEST_URL: mysql://root:economy@localhost:3306/economy_lab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18'
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm test
      - run: npm run prove
      - run: npm run fuzz
